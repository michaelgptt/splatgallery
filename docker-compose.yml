services:
  web:
    build:
      context: .
      # Build from the git-tracked Dockerfile.txt directly. Docker ignores the
      # extension, and this keeps the file Compose builds from the same one git
      # tracks — so `git pull` always updates it (no rename dance on the VM).
      dockerfile: Dockerfile.txt
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    volumes:
      # The entire /public tree lives on the VM at the canonical path /srv/data —
      # one source of truth for nginx (served off disk) and this container (via
      # this mount). Light assets are mirrored from git by deploy-scripts/deploy.sh;
      # the heavy processed-data splats are rsync/scp'd into /srv/data/processed-data
      # separately (not in git or the image). The mount must be COMPLETE before
      # `docker compose up` — it shadows the /app/public baked into the image.
      - /srv/data:/app/public:ro
      # [host_path]:[container_path][:options] ":ro" prevents docker from changing files in host directory.
    restart: unless-stopped
