services:
  web:
    build:
      context: .
      # Build from the git-tracked Dockerfile.txt directly. Docker ignores the
      # extension, and this keeps the file Compose builds from the same one git
      # tracks — so `git pull` always updates it (no rename dance on the VM).
      dockerfile: Dockerfile.txt
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    volumes:
      # Heavy splat assets live ONLY on the VM. They are not tracked in git and not
      # baked into the image (see .dockerignore). rsync/scp them into
      # ./public/processed-data on the VM BEFORE deploying; mounted read-only here.
      - ./public/processed-data:/app/public/processed-data:ro #Host Volume
      # [host_path]:[container_path][:options] ":ro" prevents docker from changing files in host directory.
    restart: unless-stopped
