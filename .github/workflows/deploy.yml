name: Deploy to VM

# WHEN this runs.
on:
  push:
    branches: [main]      # every merge/push to main triggers a deploy
  workflow_dispatch: {}   # also adds a manual "Run workflow" button in the Actions tab
                          # (great for testing without pushing code)

# Never let two deploys run at the same time. If merges land back-to-back,
# the second one queues behind the first instead of racing it.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest   # a throwaway runner GitHub spins up; it SSHes into the VM
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0   # pre-made "ssh into a host and run a command" action
        with:
          # These three come from repo Settings → Secrets and variables → Actions.
          host: ${{ secrets.VM_HOST }}     # VM hostname or IP
          username: ${{ secrets.VM_USER }} # SSH user (must run `docker compose` WITHOUT sudo)
          key: ${{ secrets.VM_SSH_KEY }}   # full contents of the PRIVATE deploy key
          # ── FILL THIS IN ── use the same absolute VM path as REPO_DIR in deploy.sh:
          script: bash /path/to/splatgallery/deploy-scripts/deploy.sh   # ← CHANGE ME
